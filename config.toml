baseurl = "https://www.itsnothing.de/"
languageCode = "en-US"
defaultContentLanguage = "en"
theme = "terminal"
paginate = 3
publishDir = "docs"

[params]
  contentTypeName = "post"
  themeColor = "orange"
  showMenuItems = 3
  fullWidthTheme = false
  centerTheme = true
  showLanguageSelector = true
  readMore = "Read more"
  readOtherPosts = "Read other posts"

