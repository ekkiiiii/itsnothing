      <script>
        (function() {
          function initLanguageSelector() {
            var langTrigger = document.getElementById('language-selector-trigger');
            var langOptions = document.getElementById('language-options');
            var langContainer = document.getElementById('header-language-container');
            var menuTrigger = document.querySelector('.menu-trigger');
            var menu = document.querySelector('.header .menu');

            if (langTrigger && langOptions) {
              langTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                langOptions.classList.toggle('hidden');
              });
            }

            if (menuTrigger && langContainer) {
              menuTrigger.addEventListener('click', function() {
                setTimeout(function() {
                  if (menu && !menu.classList.contains('hidden')) {
                    langContainer.classList.add('mobile-hidden');
                  } else {
                    langContainer.classList.remove('mobile-hidden');
                  }
                }, 10);
              });
            }

            document.addEventListener('click', function() {
              if (langOptions) langOptions.classList.add('hidden');
            });
          }

          if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initLanguageSelector();
          } else {
            document.addEventListener('DOMContentLoaded', initLanguageSelector);
          }
        })();
