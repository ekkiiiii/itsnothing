{{ $series := .Params.articleSeries }}
{{ if $series }}
  {{ $title := $series.title | default "Article Series" }}
  <div class="article-series">
    <h5 class="article-series__title"><span>{{ $title }}</span></h5>
    <div class="article-series__body">
      <ul>
        {{ range $series.items }}
          <li>
            <a href="{{ .url | relURL }}">{{ .title }}</a>
            {{ with .description }} - {{ . }}{{ end }}
          </li>
        {{ end }}
      </ul>
    </div>
  </div>
{{ end }}
