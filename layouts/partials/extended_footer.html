{{ if .Params.mermaid }}
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (!window.mermaid) {
      return;
    }

    var styles = getComputedStyle(document.body);
    var pageBackground = styles.getPropertyValue("--background").trim() || styles.backgroundColor || "transparent";
    var pageAccent = styles.getPropertyValue("--accent").trim() || "#23b0ff";

    document.querySelectorAll("pre > code.language-mermaid").forEach(function (codeBlock) {
      var pre = codeBlock.parentElement;
      var diagram = document.createElement("div");

      diagram.className = "mermaid";
      diagram.textContent = codeBlock.textContent;
      pre.replaceWith(diagram);
    });

    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      themeVariables: {
        background: pageBackground,
        primaryColor: pageBackground,
        secondaryColor: pageBackground,
        tertiaryColor: pageBackground,
        primaryBorderColor: pageAccent,
        secondaryBorderColor: pageAccent,
        tertiaryBorderColor: pageAccent,
        lineColor: pageAccent,
        textColor: styles.color || "#ffffff",
        primaryTextColor: styles.color || "#ffffff",
        secondaryTextColor: styles.color || "#ffffff",
        tertiaryTextColor: styles.color || "#ffffff",
        nodeTextColor: styles.color || "#ffffff",
        titleColor: styles.color || "#ffffff",
        mainBkg: pageBackground
      }
    });

    mermaid.run({ querySelector: ".mermaid" });
  });
</script>
<style>
  .mermaid {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin: 1.5rem auto;
  }
  .mermaid,
  .mermaid svg {
    background: transparent !important;
  }
</style>
{{ end }}
